name: EGold CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Foundry + Proof Publication Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Install project dependencies
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p lib

          if [ ! -f lib/forge-std/src/Test.sol ]; then
            echo "Installing forge-std..."
            rm -rf lib/forge-std
            git clone --depth 1 https://github.com/foundry-rs/forge-std.git lib/forge-std
          else
            echo "forge-std already present"
          fi

          if [ ! -f lib/openzeppelin-contracts/contracts/token/ERC20/ERC20.sol ]; then
            echo "Installing OpenZeppelin Contracts v5.0.2..."
            rm -rf lib/openzeppelin-contracts
            git clone --depth 1 --branch v5.0.2 https://github.com/OpenZeppelin/openzeppelin-contracts.git lib/openzeppelin-contracts
          else
            echo "OpenZeppelin Contracts already present"
          fi

      - name: Forge version
        run: forge --version

      - name: Forge tests
        run: forge test -vvv

      - name: Forge CI profile tests
        run: FOUNDRY_PROFILE=ci forge test -vvv

      - name: Proof examples
        run: make proof-check

      - name: Public proof offline verifier
        run: make verify-public-proofs-offline

      - name: Public site check
        run: make public-site-check
