[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.20"
optimizer = true
optimizer_runs = 200
gas_reports = ["EGold"]
fs_permissions = [
  { access = "read-write", path = "./deployments" },
  { access = "read-write", path = "./audit-results" }
]
remappings = [
  "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
  "forge-std/=lib/forge-std/src/"
]

[fuzz]
runs = 4096
max_test_rejects = 100000

[invariant]
runs = 512
depth = 128
fail_on_revert = false
call_override = false
dictionary_weight = 40
include_storage = true
include_push_bytes = true

[profile.ci.fuzz]
runs = 10000
max_test_rejects = 100000

[profile.ci.invariant]
runs = 2048
depth = 256
fail_on_revert = false
call_override = false
dictionary_weight = 40
include_storage = true
include_push_bytes = true
